<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="popupTitle">Media Monitor</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <header class="popup-header">
    <div class="popup-header__meta">
      <span class="ui-status popup-status" id="status-indicator" data-i18n="popupStatusConnecting">Connecting…</span>
    </div>
    <div class="popup-header__actions">
      <button type="button" class="ui-icon-button" id="settings-btn" title="Settings" aria-label="Settings" data-i18n-title="popupSettings" data-i18n-aria-label="popupSettings">
        <span aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M12 3.5l1.2 2.1 2.4.3.5 2.3 2 1.3-1 2.2.8 2.3-2 1.2-.6 2.3-2.4.2L12 20.5l-1.2-2.1-2.4-.3-.5-2.3-2-1.3 1-2.2-.8-2.3 2-1.2.6-2.3 2.4-.2L12 3.5z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </span>
      </button>
    </div>
  </header>
  <main class="popup-main">
    <section id="media-root" class="media-root">
      <div class="empty-state">
        <strong data-i18n="popupNoMediaTitle">No media detected</strong>
        <p class="ui-empty-state" data-i18n="popupNoMediaDescription">Start playback on YouTube, Bilibili, Douyin, or another supported site.</p>
      </div>
    </section>
  </main>

  <section class="drawer-panel settings-panel" id="settings-panel" aria-hidden="true">
    <div class="drawer-panel__header">
      <button type="button" class="ui-icon-button ui-icon-button--secondary ui-icon-button--sm drawer-back" id="settings-back" title="Back" aria-label="Back" data-i18n-title="settingsBack" data-i18n-aria-label="settingsBack"></button>
      <div>
        <h2 data-i18n="settingsTitle">Settings</h2>
      </div>
    </div>

    <div class="drawer-panel__body settings-panel__body">
      <section class="settings-section settings-section--appearance" data-settings-section="appearance">
        <div class="settings-section__header">
          <h3 data-i18n="settingsAppearance">Appearance</h3>
          <div class="ui-segmented appearance-options" role="radiogroup" aria-label="Theme" data-i18n-aria-label="settingsTheme">
            <button type="button" class="ui-segmented__item" data-theme-option="system" role="radio" data-i18n="settingsThemeSystem">System</button>
            <button type="button" class="ui-segmented__item" data-theme-option="light" role="radio" data-i18n="settingsThemeLight">Light</button>
            <button type="button" class="ui-segmented__item" data-theme-option="dark" role="radio" data-i18n="settingsThemeDark">Dark</button>
          </div>
        </div>
      </section>

      <section class="settings-section settings-section--language" data-settings-section="language">
        <div class="settings-section__header">
          <h3 data-i18n="settingsLanguage">Language</h3>
          <div class="ui-segmented language-options" role="radiogroup" aria-label="Language" data-i18n-aria-label="settingsLanguage">
            <button type="button" class="ui-segmented__item" data-language-option="system" role="radio" data-i18n="settingsLanguageSystem">System</button>
            <button type="button" class="ui-segmented__item" data-language-option="en" role="radio" data-i18n="settingsLanguageEnglish">English</button>
            <button type="button" class="ui-segmented__item" data-language-option="zh" role="radio" data-i18n="settingsLanguageChinese">中文</button>
          </div>
        </div>
      </section>

      <section class="settings-section settings-section--connections" data-settings-section="connections">
        <div class="settings-section__header">
          <h3 data-i18n="settingsConnections">Connections</h3>
          <span class="ui-field__hint server-summary" id="server-summary" data-i18n="settingsServerSummaryEmpty">Add a server address to start syncing.</span>
        </div>
        <section id="server-root" class="server-root"></section>
      </section>

      <section class="settings-section settings-section--blacklist" data-settings-section="blacklist">
        <div class="settings-section__header">
          <h3 data-i18n="settingsBlacklist">Blacklist</h3>
        </div>
        <div class="pill-list-editor blacklist-editor">
          <div class="priority-editor__list pill-list-editor__list blacklist-list" id="blacklist-list"></div>
          <div class="settings-field__error blacklist-draft-error" id="blacklist-draft-error" hidden></div>
        </div>
      </section>
    </div>
  </section>

  <template id="media-row-template">
    <article class="ui-list-item media-row">
      <div class="media-row__header">
        <div class="media-row__title"></div>
        <span class="ui-badge media-row__status"></span>
      </div>
      <div class="media-row__subtitle"></div>
      <div class="media-row__meta"></div>
      <div class="ui-progress media-row__progress">
        <div class="ui-progress__bar media-row__progress-bar"></div>
      </div>
      <div class="media-row__time"></div>
      <div class="media-row__actions">
        <a class="media-row__link" target="_blank" rel="noreferrer noopener">Open tab</a>
      </div>
    </article>
  </template>

  <script type="module" src="dist/popup.js"></script>
</body>

</html>
