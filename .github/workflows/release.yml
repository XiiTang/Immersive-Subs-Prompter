name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag such as v1.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: pnpm release:check -- --tag "${{ steps.meta.outputs.tag }}"
      - run: pnpm typecheck
      - run: pnpm test

  desktop:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: pnpm --filter @immersive-subs/desktop-app dist:mac -- --publish never
            name: desktop-macos
          - os: windows-latest
            command: pnpm --filter @immersive-subs/desktop-app dist:win -- --publish never
            name: desktop-windows
          - os: ubuntu-latest
            command: pnpm --filter @immersive-subs/desktop-app dist:linux -- --publish never
            name: desktop-linux
    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm
      - if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name}" ]; then
              echo "Missing macOS signing or notarization secrets: $name"
              exit 1
            fi
          done
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: apps/desktop-app/out

  extension:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @immersive-subs/extension build:chrome
      - run: pnpm --filter @immersive-subs/extension build:firefox
      - run: pnpm release:zip-extension
      - uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: release-artifacts/extension

  publish:
    needs:
      - validate
      - desktop
      - extension
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - shell: bash
        run: |
          mkdir -p release-artifacts/desktop release-artifacts/extension
          find release-artifacts/desktop-* -type f -exec cp {} release-artifacts/desktop/ \;
          find release-artifacts/extension-zips -type f -exec cp {} release-artifacts/extension/ \;
      - run: pnpm release:check-builder-artifacts -- --version "${{ needs.validate.outputs.version }}" --desktop release-artifacts/desktop --extension release-artifacts/extension
      - shell: bash
        run: |
          find release-artifacts/desktop release-artifacts/extension -type f -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > release-artifacts/checksums.txt
      - shell: bash
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --draft --title "$TAG" --notes "Release $TAG"
          find release-artifacts/desktop release-artifacts/extension -type f -print0 | xargs -0 gh release upload "$TAG" --clobber
          gh release upload "$TAG" release-artifacts/checksums.txt --clobber
