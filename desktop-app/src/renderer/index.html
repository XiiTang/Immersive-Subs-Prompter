<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Subtitle</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="window">
      <header class="window__header">
        <div class="window__title">Universal Subtitle</div>
        <div class="window__status" id="connection-indicator">未连接</div>
      </header>
      <section class="video-meta" id="video-meta">
        <p class="video-meta__title" id="video-title">等待视频...</p>
        <p class="video-meta__url" id="video-url"></p>
        <p class="video-meta__language" id="subtitle-language"></p>
      </section>
      <section class="control-panel" id="control-panel">
        <label class="track-picker">
          <span>字幕轨道</span>
          <select id="track-selector"></select>
        </label>
        <div class="playback-buttons">
          <button id="play-btn" type="button">播放</button>
          <button id="pause-btn" type="button">暂停</button>
        </div>
      </section>
      <section class="status-banner" id="status-banner">正在初始化...</section>
      <section class="yt-dlp-settings" id="yt-dlp-settings">
        <div class="settings__header">
          <h3>yt-dlp 配置</h3>
          <p>可选：填写 cookies 文件路径，或固定只下载指定语言的字幕（逗号分隔）。</p>
        </div>
        <form class="settings__form" id="yt-dlp-form">
          <label class="form-field">
            <span>Cookies 文件路径</span>
            <input type="text" id="yt-dlp-cookies" placeholder="/path/to/cookies.txt" spellcheck="false" />
          </label>
          <label class="form-field">
            <span>字幕语言（留空=全部，例：zh-Hans,en）</span>
            <input type="text" id="yt-dlp-languages" placeholder="zh-Hans,zh,en" spellcheck="false" />
          </label>
          <div class="settings__actions">
            <button type="submit" id="yt-dlp-save">保存配置</button>
            <span class="settings__status" id="yt-dlp-status"></span>
          </div>
        </form>
      </section>
      <section class="subtitle-list" id="subtitle-list"></section>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
