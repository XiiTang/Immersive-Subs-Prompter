<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Subtitle</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="window">
      <header class="window__header">
        <div class="window__title">Universal Subtitle</div>
        <div class="window__status" id="connection-indicator">未连接</div>
        <div class="window__header-actions">
          <button type="button" class="icon-button" id="settings-btn" aria-label="打开设置">
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
      </header>
      <div class="window__content">
        <div class="primary-view" id="primary-view">
          <section class="video-meta" id="video-meta">
            <p class="video-meta__title" id="video-title">等待视频...</p>
            <p class="video-meta__url" id="video-url"></p>
            <p class="video-meta__language" id="subtitle-language"></p>
          </section>
          <section class="control-panel" id="control-panel">
            <label class="track-picker">
              <span>字幕轨道</span>
              <select id="track-selector"></select>
            </label>
            <div class="playback-buttons">
              <button id="play-btn" type="button">播放</button>
              <button id="pause-btn" type="button">暂停</button>
            </div>
          </section>
          <section class="status-banner" id="status-banner">正在初始化...</section>
          <section class="subtitle-list" id="subtitle-list"></section>
        </div>
        <section class="settings-panel" id="settings-panel" aria-hidden="true">
          <div class="settings-panel__header">
            <button type="button" class="text-button" id="settings-back">
              ← 返回
            </button>
            <div class="settings-panel__title">设置</div>
          </div>
          <div class="settings-panel__content">
            <label class="settings-field">
              <span class="settings-field__label">关闭行为</span>
              <select id="close-behavior">
                <option value="tray">关闭时最小化到托盘</option>
                <option value="quit">关闭时直接退出</option>
              </select>
            </label>
            <div class="settings-field settings-field--inline">
              <span class="settings-field__label">开机自启动</span>
              <label class="toggle">
                <input type="checkbox" id="autostart-toggle" />
                <span class="toggle__text">启用</span>
              </label>
            </div>
            <label class="settings-field">
              <span class="settings-field__label">字幕字体</span>
              <input
                type="text"
                id="subtitle-font"
                placeholder="例如: LXGW WenKai, sans-serif"
                autocomplete="off"
              />
            </label>
            <label class="settings-field">
              <span class="settings-field__label">字幕字号</span>
              <input type="number" id="subtitle-font-size" min="10" max="48" step="1" />
            </label>
            <label class="settings-field">
              <span class="settings-field__label">yt-dlp 配置</span>
              <textarea
                id="yt-dlp-args"
                rows="3"
                spellcheck="false"
                placeholder="--skip-download --write-subs --all-subs --cookies-from-browser firefox"
              ></textarea>
              <small class="settings-field__hint">留空时将使用默认配置</small>
            </label>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
