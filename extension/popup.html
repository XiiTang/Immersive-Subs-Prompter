<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Monitor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="usp-header">
      <div class="usp-header__meta">
        <div class="usp-brand">
          <span class="usp-brand__dot"></span>
          <span class="usp-brand__title">Immersive Subs</span>
        </div>
        <span class="usp-status" id="status-indicator">Connecting…</span>
      </div>
      <div class="usp-header__actions">
        <button type="button" class="usp-pill-button" id="connections-btn">
          <span class="usp-pill-button__icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="6" cy="6" r="2.5" />
              <circle cx="18" cy="6" r="2.5" />
              <circle cx="12" cy="18" r="2.5" />
              <path d="M8 7l2.5 3.5M16 7l-2.5 3.5" />
            </svg>
          </span>
          <span class="usp-pill-button__label">Connections</span>
        </button>
        <button type="button" class="usp-pill-button" id="blacklist-btn">
          <span class="usp-pill-button__icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 5h16v3H4zM4 10h16v10H4z" />
              <path d="M9 10V5M15 10V5" />
              <path d="M9 14l6 6M15 14l-6 6" />
            </svg>
          </span>
          <span class="usp-pill-button__label">Blacklist</span>
        </button>
      </div>
    </header>
    <main class="usp-main">
      <section id="media-root" class="media-root">
        <div class="empty-state">
          <strong>No media detected</strong>
          <p>Start playback on YouTube, Bilibili, Douyin, or another supported site.</p>
        </div>
      </section>
    </main>

    <section class="drawer-panel connections-panel" id="connections-panel" aria-hidden="true">
      <div class="drawer-panel__header">
        <button type="button" class="drawer-back" id="connections-back">← Back</button>
        <div>
          <h2>Connections</h2>
          <p>Manage desktop endpoints for syncing.</p>
        </div>
      </div>
      <div class="drawer-panel__body">
        <section id="server-root" class="server-root"></section>
      </div>
    </section>

    <section class="drawer-panel blacklist-panel" id="blacklist-panel" aria-hidden="true">
      <div class="drawer-panel__header">
        <button type="button" class="drawer-back" id="blacklist-back">← Back</button>
        <div>
          <h2>Blacklist</h2>
          <p>URLs matching these rules will not be detected.</p>
        </div>
      </div>
      <div class="drawer-panel__actions">
        <button type="button" class="blacklist-add" id="add-blacklist-rule">Add rule</button>
      </div>
      <div class="blacklist-empty" id="blacklist-empty-state">
        <p>No rules added yet.</p>
        <p>Click "Add rule" to create.</p>
      </div>
      <div class="blacklist-list" id="blacklist-list"></div>
    </section>

    <template id="media-card-template">
      <article class="media-card">
        <div class="media-card__header">
          <div class="media-card__title"></div>
          <span class="media-card__status"></span>
        </div>
        <div class="media-card__subtitle"></div>
        <div class="media-card__meta"></div>
        <div class="media-card__progress">
          <div class="media-card__progress-bar"></div>
        </div>
        <div class="media-card__time"></div>
        <div class="media-card__actions">
          <a class="media-card__link" target="_blank" rel="noreferrer noopener">Open tab</a>
        </div>
      </article>
    </template>

    <script type="module" src="popup.js"></script>
  </body>
</html>
